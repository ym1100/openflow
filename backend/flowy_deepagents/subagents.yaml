version: 1
roles:
  parser:
    goal: "Parse and normalize user intent into structured control/planning signals."
    responsibilities:
      - "Classify control intents (next/prev/goto/show/clear/stop/run/dismiss)."
      - "Extract workflow-intent signals for planner and validator checks."
      - "Emit canvasOperationHints: ordered EditOperation type names (addNode, removeNode, clearCanvas, updateNode, addEdge, removeEdge, moveNode, createGroup, deleteGroup, updateGroup, setNodeGroup) so the builder picks the best op for the ask."
      - "Prefer semantic understanding over keyword matching."
    constraints:
      - "Must return schema-valid JSON only."
      - "Must use intent='none' when user command is ambiguous."
    output_contract:
      fields:
        - agentControl.intent
        - agentControl.stageNumber
        - intentSignals.canvasOperationHints
        - intentSignals.asksExecuteNodes
        - intentSignals
        - rationale

  planner:
    goal: "Decide stage strategy before any edit generation."
    responsibilities:
      - "Classify user intent and deliverable type."
      - "Decompose complex requests into stages when beneficial."
      - "Define minimal stage objective and acceptance criteria."
    constraints:
      - "Must prefer reuse of existing graph when feasible."
      - "Must avoid operation-level details."
    output_contract:
      fields:
        - stageInstruction
        - stageIndex
        - stageCount
        - rationale

  prompt_specialist:
    goal: "Shape high-quality, model-aware node content and parameters."
    responsibilities:
      - "Expand/structure user creative intent without dropping details."
      - "Apply model catalog normalization constraints."
      - "Leverage canvas state memory for continuity."
    constraints:
      - "No graph mutation decisions."
      - "No edge/node topology creation."
    output_contract:
      fields:
        - enrichedMessage
        - parameterHints
        - modelHints

  builder:
    goal: "Generate minimal deterministic edit operations."
    responsibilities:
      - "Produce operation list that satisfies stage objective."
      - "Prioritize update/rewire over add-node duplication."
      - "Return executeNodeIds for runnable deliverables."
    constraints:
      - "JSON-only output with deterministic nodeIds for addNode."
      - "No conversational-only fallback unless planner mode."
    output_contract:
      fields:
        - assistantText
        - operations
        - executeNodeIds
        - runApprovalRequired

  validator:
    goal: "Verify operation safety, expected canvas deltas, and execution-readiness."
    responsibilities:
      - "Classify operation risk tiers: safe, caution, destructive."
      - "Require approval for destructive edits and policy-driven caution edits."
      - "Report post-apply delta checks and telemetry metadata."
    constraints:
      - "Must not invent operations."
      - "Must preserve deterministic JSON fields."
    output_contract:
      fields:
        - safetyPolicy
        - postApplyCheck
        - telemetry

capabilities:
  policy:
    assistModeDefault: "canvas_control_first"
    approval:
      destructive: "always_required"
      caution: "env_or_payload_controlled"

